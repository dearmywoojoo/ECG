<script>
  var jsxSource = "const { useState, useMemo, useEffect } = React;\n\n\n/* ============================================================\n   KHAIM ECG Atlas \u2014 Learning-first redesign\n   \ud1a4: \uc784\uc0c1 \uc544\ud2c0\ub77c\uc2a4 / \uad50\uacfc\uc11c. PPT \ubc1c\ud45c\uc790\ub8cc \ub8e9\uc5d0\uc11c \uc644\uc804\ud788 \ubc97\uc5b4\ub098\n   \"\ubc30\uc6b0\ub294 \ub3c4\uad6c\"\ub85c \uc7ac\uc124\uacc4.\n\n   \ub514\uc790\uc778 \ud1a0\ud070\n   - Paper:    #FFFFFF / \uce74\ub4dc #F7F8F6\n   - Ink:      #1C2321 (\ub530\ub73b\ud55c \ucc28\ucf5c)\n   - Red:      #C8102E (KHAIM \ube0c\ub79c\ub4dc, \"\uc8fc\uc758\uac00 \ud544\uc694\ud55c \uc9c0\uc810\"\uc5d0\ub9cc \uc0ac\uc6a9)\n   - Slate:    #3D5A6C (\uc815\uc0c1/\uae30\uc900\uc120 \u2014 \uc2e0\ub8b0\uc758 \uceec\ub7ec)\n   - Amber:    #C9911F (\ud559\uc2b5 \uc9c4\ud589 \ub2e8\uacc4 \uac15\uc870)\n   - Line:     #E3E2DC\n   - Mute:     #767D78\n\n   \ud0c0\uc774\ud3ec: Source Serif 4(\uc81c\ubaa9, \uad8c\uc704\uac10) / Inter(\ubcf8\ubb38) / JetBrains Mono(\uc218\uce58)\n\n   \uad6c\uc870\n   1. Home \u2014 \ud575\uc2ec \uc561\uc158 \uce74\ub4dc(\uc77d\ub294 \ubc95/\ub77c\uc774\ube0c\ub7ec\ub9ac/\ud034\uc988) + \ub9e8 \uc544\ub798 \ud559\uc2b5 \uc9c4\ud589\ub3c4\n   2. Learn (\ub2e8\uacc4\ubcc4) \u2014 P\u2192QRS\u2192T \ub77c\ubca8\uc774 \uc21c\ucc28 \ub4f1\uc7a5 + \uc815\uc0c1 \ubc94\uc704 \uae30\uc900\ud45c\n   3. Library \u2014 \uce74\ud14c\uace0\ub9ac\ubcc4 \ubd80\uc815\ub9e5 \ubaa9\ub85d (\uc774\ubbf8\uc9c0 \uc5c5\ub85c\ub4dc \uac00\ub2a5)\n   4. Detail \u2014 \uac1c\ubcc4 \ub9ac\ub4ec \uc0c1\uc138\n   5. Quiz \u2014 \ud30c\ud615 \ubcf4\uace0 \ub9de\ud788\uae30, \uc989\uc2dc \ud53c\ub4dc\ubc31\n   ============================================================ */\n\nconst FONT_IMPORT_URL =\n  \"https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap\";\n\n/* ---------------- ECG waveform generator ---------------- */\nfunction buildEcgPath({\n  width = 800,\n  height = 160,\n  beats = 4,\n  hr = 75,\n  pWave = true,\n  prMs = 160,\n  qrsMs = 90,\n  qrsAmp = 1,\n  irregular = false,\n  fibrillatory = false,\n  flutterWaves = false,\n  wideQrs = false,\n  noQrs = false,\n  seed = 1,\n}) {\n  const baseline = height * 0.6;\n  const rr = (60 / hr) * 1000;\n  const pxPerMs = width / (beats * rr);\n  let d = `M0,${baseline}`;\n  let cursorMs = 40;\n  const rand = (n) => {\n    const x = Math.sin(seed * 999 + n * 53.7) * 10000;\n    return x - Math.floor(x);\n  };\n  const segs = []; // record beat segments for labeling: {pStart,pEnd,qrsStart,qrsEnd,tStart,tEnd}\n\n  for (let b = 0; b < beats; b++) {\n    let thisRR = rr;\n    if (irregular) thisRR = rr * (0.7 + rand(b) * 0.7);\n    const startMs = cursorMs;\n    const toX = (ms) => ms * pxPerMs;\n    const seg = {};\n\n    if (fibrillatory) {\n      const fSeg = startMs;\n      const steps = 14;\n      for (let i = 0; i < steps; i++) {\n        const ms = fSeg - 60 + (i / steps) * 60;\n        if (ms < 0) continue;\n        const wob = (rand(b * 20 + i) - 0.5) * 5.5;\n        d += ` L${toX(ms).toFixed(2)},${(baseline + wob).toFixed(2)}`;\n      }\n    } else if (flutterWaves) {\n      const fSeg = startMs - 140;\n      const steps = 5;\n      for (let i = 0; i < steps; i++) {\n        const ms = fSeg + (i / steps) * 140;\n        if (ms < 0) continue;\n        const tooth = i % 2 === 0 ? -9 : 3;\n        d += ` L${toX(ms).toFixed(2)},${(baseline + tooth).toFixed(2)}`;\n      }\n    } else if (pWave) {\n      const pStart = startMs - prMs + 10;\n      const pPeak = startMs - prMs + 35;\n      const pEnd = startMs - prMs + 60;\n      d += ` L${toX(pStart).toFixed(2)},${baseline}`;\n      d += ` Q${toX(pPeak).toFixed(2)},${(baseline - 9).toFixed(2)} ${toX(pEnd).toFixed(2)},${baseline}`;\n      seg.pStart = pStart;\n      seg.pEnd = pEnd;\n    }\n\n    d += ` L${toX(startMs).toFixed(2)},${baseline}`;\n\n    if (!noQrs || b % 3 !== 2) {\n      const qDur = wideQrs ? qrsMs * 1.9 : qrsMs;\n      const qDip = startMs + qDur * 0.12;\n      const rPeak = startMs + qDur * 0.4;\n      const sDip = startMs + qDur * 0.62;\n      const back = startMs + qDur * 0.85;\n\n      d += ` L${toX(qDip).toFixed(2)},${(baseline + 6).toFixed(2)}`;\n      d += ` L${toX(rPeak).toFixed(2)},${(baseline - 58 * qrsAmp * (wideQrs ? 0.8 : 1)).toFixed(2)}`;\n      d += ` L${toX(sDip).toFixed(2)},${(baseline + (wideQrs ? 22 : 16)).toFixed(2)}`;\n      d += ` L${toX(back).toFixed(2)},${baseline}`;\n      seg.qrsStart = startMs;\n      seg.qrsEnd = back;\n\n      const tStart = back + 30;\n      const tPeak = back + 70;\n      const tEnd = back + 120;\n      d += ` L${toX(tStart).toFixed(2)},${baseline}`;\n      d += ` Q${toX(tPeak).toFixed(2)},${(baseline - 15).toFixed(2)} ${toX(tEnd).toFixed(2)},${baseline}`;\n      seg.tStart = tStart;\n      seg.tEnd = tEnd;\n    }\n\n    seg.beatStart = startMs;\n    segs.push(seg);\n    cursorMs = startMs + thisRR;\n  }\n\n  d += ` L${width},${baseline}`;\n  return { path: d, segs, baseline, pxPerMs };\n}\n\nfunction EcgStrip({ config, height = 150, accent = \"#3D5A6C\", animated = false, uid, dimmed = false, imageUrl = null }) {\n  const width = 800;\n  const { path } = useMemo(() => buildEcgPath({ width, height, ...config }), [config, height]);\n  const gid = `g-${uid}`;\n\n  if (imageUrl) {\n    return (\n      <img\n        src={imageUrl}\n        alt=\"ECG strip\"\n        className=\"ecg-img\"\n        style={{ width: \"100%\", height: \"100%\", objectFit: \"cover\", display: \"block\" }}\n      />\n    );\n  }\n\n  return (\n    <svg viewBox={`0 0 ${width} ${height}`} className=\"ecg-svg\" preserveAspectRatio=\"none\">\n      <defs>\n        <pattern id={gid} width=\"20\" height=\"20\" patternUnits=\"userSpaceOnUse\">\n          <path d=\"M20 0H0V20\" fill=\"none\" stroke=\"#EEEDE7\" strokeWidth=\"0.6\" />\n        </pattern>\n      </defs>\n      <rect width={width} height={height} fill=\"#FCFCFA\" />\n      <rect width={width} height={height} fill={`url(#${gid})`} />\n      <path\n        d={path}\n        fill=\"none\"\n        stroke={accent}\n        strokeWidth=\"2.3\"\n        strokeLinejoin=\"round\"\n        strokeLinecap=\"round\"\n        opacity={dimmed ? 0.35 : 1}\n        className={animated ? \"trace-draw\" : \"\"}\n      />\n    </svg>\n  );\n}\n\n/* ---------------- Data ---------------- */\nconst NORMAL_RANGES = [\n  { label: \"\uc2ec\ubc15\uc218\", labelEn: \"Heart Rate\", value: \"60\u2013100\", unit: \"bpm\" },\n  { label: \"PR Interval\", labelEn: \"AV Conduction\", value: \"120\u2013200\", unit: \"ms\" },\n  { label: \"QRS Duration\", labelEn: \"Ventricular Depol.\", value: \"60\u2013100\", unit: \"ms\" },\n  { label: \"QT Interval\", labelEn: \"Ventricular Cycle\", value: \"350\u2013440\", unit: \"ms\" },\n  { label: \"QTc (Bazett)\", labelEn: \"Corrected QT\", value: \"\ub0a8 \u2264440 / \uc5ec \u2264460\", unit: \"ms\" },\n  { label: \"P wave \ud3ed\", labelEn: \"Atrial Depol.\", value: \"\u2264120\", unit: \"ms\" },\n];\n\nconst NSR_CONFIG = { hr: 72, pWave: true, prMs: 160, qrsMs: 90, beats: 5 };\n\nconst RHYTHMS = [\n  {\n    id: \"afib\",\n    imageUrl: null, // \uc2e4\uc81c ECG \uc774\ubbf8\uc9c0 URL\uc744 \ub123\uc73c\uba74 \uc790\ub3d9\uc73c\ub85c SVG \ub300\uc2e0 \ud45c\uc2dc\ub429\ub2c8\ub2e4\n    category: \"\uc2ec\ubc29 \ubd80\uc815\ub9e5\",\n    name: \"\uc2ec\ubc29\uc138\ub3d9\",\n    nameEn: \"Atrial Fibrillation\",\n    abbr: \"AF\",\n    hrRange: \"\uac00\ubcc0\uc801\",\n    summary: \"\uc2ec\ubc29\uc774 \ubb34\uc9c8\uc11c\ud558\uac8c \ube60\ub974\uac8c \ud765\ubd84\ud558\uc5ec P\ud30c\uac00 \uc0ac\ub77c\uc9c0\uace0 \uae30\uc800\uc120\uc774 \ud754\ub4e4\ub9ac\ub294 \ubd80\uc815\ub9e5.\",\n    keyDiff: \"P\ud30c\uac00 \uc0ac\ub77c\uc9c0\uace0 R-R \uac04\uaca9\uc774 \ubd88\uaddc\uce59\ud558\uac8c \ubd88\uaddc\uce59\ud569\ub2c8\ub2e4.\",\n    items: [\n      { label: \"P\ud30c\", desc: \"\ub69c\ub837\ud55c P\ud30c \uc18c\uc2e4, \ubd88\uaddc\uce59\ud55c \uc138\ub3d9\ud30c(f wave)\" },\n      { label: \"\ub9ac\ub4ec\", desc: \"R-R \uac04\uaca9\uc774 \ubd88\uaddc\uce59\ud558\uac8c \ubd88\uaddc\uce59\" },\n      { label: \"\uc704\ud5d8\", desc: \"\uc2ec\ubc29 \uc218\ucd95 \uc18c\uc2e4\ub85c \ud608\uc804 \uc704\ud5d8 \uc99d\uac00\" },\n    ],\n    clinicalNote: \"\ub1cc\uc878\uc911 \uc704\ud5d8 \ud3c9\uac00(CHA2DS2-VASc) \ubc0f \ud56d\uc751\uace0 \uce58\ub8cc \uace0\ub824 \ub300\uc0c1.\",\n    config: { hr: 95, pWave: false, fibrillatory: true, irregular: true, qrsMs: 90, beats: 6, seed: 3 },\n  },\n  {\n    id: \"aflutter\",\n    imageUrl: null, // \uc2e4\uc81c ECG \uc774\ubbf8\uc9c0 URL\uc744 \ub123\uc73c\uba74 \uc790\ub3d9\uc73c\ub85c SVG \ub300\uc2e0 \ud45c\uc2dc\ub429\ub2c8\ub2e4\n    category: \"\uc2ec\ubc29 \ubd80\uc815\ub9e5\",\n    name: \"\uc2ec\ubc29\uc870\ub3d9\",\n    nameEn: \"Atrial Flutter\",\n    abbr: \"AFL\",\n    hrRange: \"\uc2ec\ubc29 250\u2013350\",\n    summary: \"\uc2ec\ubc29\uc774 \uaddc\uce59\uc801\uc73c\ub85c \ub9e4\uc6b0 \ube60\ub974\uac8c \ud765\ubd84\ud558\uba70, \ud1b1\ub2c8 \ubaa8\uc591\uc758 \uc870\ub3d9\ud30c(F wave)\uac00 \ud2b9\uc9d5\uc801\uc774\ub2e4.\",\n    keyDiff: \"P\ud30c \uc790\ub9ac\uc5d0 \ud1b1\ub2c8 \ubaa8\uc591 F\ud30c\uac00 \uc77c\uc815\ud55c \uac04\uaca9\uc73c\ub85c \ubc18\ubcf5\ub429\ub2c8\ub2e4.\",\n    items: [\n      { label: \"F\ud30c\", desc: \"\ud1b1\ub2c8 \ubaa8\uc591(sawtooth)\uc758 \uaddc\uce59\uc801 F\ud30c\" },\n      { label: \"\uc804\ub3c4\", desc: \"\uc804\ud615\uc801\uc73c\ub85c 2:1, 3:1 \ub4f1 \uc77c\uc815 \ube44\uc728 \ubc29\uc2e4\uc804\ub3c4\" },\n      { label: \"\uc720\ub3c4\", desc: \"\ud558\ubcbd \uc720\ub3c4(II, III, aVF)\uc5d0\uc11c \uac00\uc7a5 \ub69c\ub837\" },\n    ],\n    clinicalNote: \"\uc804\uae30\uc801 \ub610\ub294 \uc57d\ubb3c\uc801 \uc728\ub3d9\uc804\ud658, \ub610\ub294 \uc728\uc18d \uc870\uc808 \uce58\ub8cc \uace0\ub824.\",\n    config: { hr: 100, pWave: false, flutterWaves: true, qrsMs: 90, beats: 5, seed: 2 },\n  },\n  {\n    id: \"svt\",\n    imageUrl: null, // \uc2e4\uc81c ECG \uc774\ubbf8\uc9c0 URL\uc744 \ub123\uc73c\uba74 \uc790\ub3d9\uc73c\ub85c SVG \ub300\uc2e0 \ud45c\uc2dc\ub429\ub2c8\ub2e4\n    category: \"\uc2ec\ubc29 \ubd80\uc815\ub9e5\",\n    name: \"\ubc1c\uc791\uc131 \uc0c1\uc2ec\uc2e4\uc131 \ube48\ub9e5\",\n    nameEn: \"Paroxysmal SVT\",\n    abbr: \"SVT\",\n    hrRange: \"150\u2013250 bpm\",\n    summary: \"\ubc29\uc2e4\uacb0\uc808 \ub610\ub294 \ubd80\uc804\ub3c4\ub85c\ub97c \ud1b5\ud55c \ud68c\uadc0 \ud68c\ub85c\ub85c \uac11\uc790\uae30 \uc2dc\uc791\u00b7\uc885\ub8cc\ub418\ub294 \ube60\ub978 \uc881\uc740 QRS \ube48\ub9e5.\",\n    keyDiff: \"QRS\ub294 \uc881\uc740\ub370 \uc18d\ub3c4\ub9cc \uc815\uc0c1\uc758 2\ubc30 \uc774\uc0c1\uc73c\ub85c \ub9e4\uc6b0 \ube60\ub985\ub2c8\ub2e4.\",\n    items: [\n      { label: \"\ub9ac\ub4ec\", desc: \"\uaddc\uce59\uc801\uc778 R-R \uac04\uaca9\" },\n      { label: \"QRS\", desc: \"\uc881\uc740 QRS (\uc815\uc0c1 \uc804\ub3c4 \uc2dc)\" },\n      { label: \"\uacbd\uacfc\", desc: \"\uae09\uaca9\ud55c \ubc1c\ubcd1\uacfc \uc885\ub8cc\uac00 \ud2b9\uc9d5\" },\n    ],\n    clinicalNote: \"\ubbf8\uc8fc\uc2e0\uacbd \uc790\uadf9(\ubc1c\uc0b4\ubc14)\uc774\ub098 \uc544\ub370\ub178\uc2e0 \ud22c\uc5ec\ub85c \uc885\ub8cc \uc2dc\ub3c4.\",\n    config: { hr: 185, pWave: false, prMs: 100, qrsMs: 80, beats: 8 },\n  },\n  {\n    id: \"vt\",\n    imageUrl: null, // \uc2e4\uc81c ECG \uc774\ubbf8\uc9c0 URL\uc744 \ub123\uc73c\uba74 \uc790\ub3d9\uc73c\ub85c SVG \ub300\uc2e0 \ud45c\uc2dc\ub429\ub2c8\ub2e4\n    category: \"\uc2ec\uc2e4 \ubd80\uc815\ub9e5\",\n    name: \"\uc2ec\uc2e4\ube48\ub9e5\",\n    nameEn: \"Ventricular Tachycardia\",\n    abbr: \"VT\",\n    hrRange: \"100\u2013250 bpm\",\n    summary: \"\uc2ec\uc2e4\uc5d0\uc11c \uae30\uc6d0\ud55c \uad11\ubc94\uc704 QRS \ube48\ub9e5. \ud608\uc5ed\ud559\uc801 \ubd88\uc548\uc815 \ubc0f \uc2ec\uc2e4\uc138\ub3d9\uc73c\ub85c \uc9c4\ud589 \uac00\ub2a5\ud55c \uc751\uae09 \ub9ac\ub4ec.\",\n    keyDiff: \"QRS\uac00 \ub208\uc5d0 \ub744\uac8c \ub113\uc5b4\uc9c0\uace0, P\ud30c\uc640 \ubb34\uad00\ud558\uac8c \ube60\ub974\uac8c \ub701\ub2c8\ub2e4.\",\n    items: [\n      { label: \"QRS\", desc: \"\ub113\uc740 QRS (\u2265120ms)\" },\n      { label: \"\ud574\ub9ac\", desc: \"\ubc29\uc2e4 \ud574\ub9ac(AV dissociation) \uac00\ub2a5\" },\n      { label: \"\ubd84\ub958\", desc: \"\uc9c0\uc18d \uc2dc\uac04 \u226530\ucd08\ub294 sustained VT\" },\n    ],\n    clinicalNote: \"\ub9e5\ubc15 \uc720\ubb34 \ud655\uc778 \ud544\uc218. \ubb34\ub9e5\uc131 VT\ub294 \uc989\uc2dc \uc81c\uc138\ub3d9 \uc801\uc751\uc99d.\",\n    config: { hr: 165, pWave: false, qrsMs: 140, wideQrs: true, qrsAmp: 1.15, beats: 6, seed: 4 },\n    critical: true,\n  },\n  {\n    id: \"avblock3\",\n    imageUrl: null, // \uc2e4\uc81c ECG \uc774\ubbf8\uc9c0 URL\uc744 \ub123\uc73c\uba74 \uc790\ub3d9\uc73c\ub85c SVG \ub300\uc2e0 \ud45c\uc2dc\ub429\ub2c8\ub2e4\n    category: \"\uc804\ub3c4 \uc7a5\uc560\",\n    name: \"3\ub3c4 \ubc29\uc2e4\ucc28\ub2e8\",\n    nameEn: \"Complete AV Block\",\n    abbr: \"CAVB\",\n    hrRange: \"\uc2ec\ubc29\u00b7\uc2ec\uc2e4 \ub3c5\ub9bd\uc801\",\n    summary: \"\ubc29\uc2e4 \uacb0\uc808\uc5d0\uc11c \uc804\uae30 \uc2e0\ud638 \uc804\ub3c4\uac00 \uc644\uc804\ud788 \ucc28\ub2e8\ub418\uc5b4 \uc2ec\ubc29\uacfc \uc2ec\uc2e4\uc774 \uac01\uc790 \ub3c5\ub9bd\uc801\uc73c\ub85c \ubc15\ub3d9\ud55c\ub2e4.\",\n    keyDiff: \"P\ud30c\uc640 QRS\uac00 \uc11c\ub85c \uc804\ud600 \uc0c1\uad00\uc5c6\uc774 \uac01\uc790\uc758 \ubc15\uc790\ub85c \ub701\ub2c8\ub2e4.\",\n    items: [\n      { label: \"\ud574\ub9ac\", desc: \"P\ud30c\uc640 QRS\uad70\uc774 \uc644\uc804\ud788 \ubb34\uad00\ud558\uac8c \ucd9c\ud604\" },\n      { label: \"\ub9ac\ub4ec\", desc: \"P-P, R-R \uac04\uaca9\uc740 \uac01\uac01 \uaddc\uce59\uc801\" },\n      { label: \"\uc704\ud5d8\", desc: \"\uc774\ud0c8\ub9ac\ub4ec \ub290\ub9b4 \uacbd\uc6b0 \uc2e4\uc2e0\u00b7\uae09\uc0ac \uc704\ud5d8\" },\n    ],\n    clinicalNote: \"\uc99d\uc0c1 \ub3d9\ubc18 \uc2dc \uc601\uad6c \uc2ec\ubc15\ub3d9\uae30 \uc0bd\uc785\uc774 \ud45c\uc900 \uce58\ub8cc.\",\n    config: { hr: 38, pWave: true, prMs: 0, qrsMs: 110, beats: 4, seed: 5 },\n    critical: true,\n  },\n];\n\nconst CATEGORY_ORDER = [\"\uc2ec\ubc29 \ubd80\uc815\ub9e5\", \"\uc2ec\uc2e4 \ubd80\uc815\ub9e5\", \"\uc804\ub3c4 \uc7a5\uc560\"];\n\nconst LEARN_STEPS = [\n  {\n    key: \"p\",\n    label: \"P\ud30c\",\n    labelEn: \"P Wave\",\n    desc: \"\uc2ec\ubc29\uc758 \ud0c8\ubd84\uadf9(\uc218\ucd95 \uc2dc\uc791)\uc744 \ub098\ud0c0\ub0c5\ub2c8\ub2e4. \ub3d9\uacb0\uc808\uc5d0\uc11c \uc2dc\uc791\ub41c \uc2e0\ud638\uac00 \uc591\ucabd \uc2ec\ubc29\uc73c\ub85c \ud37c\uc9c0\ub294 \uacfc\uc815\uc774\uc5d0\uc694.\",\n    detail: \"\ud3ed \u2264120ms \u00b7 \ubd80\ub4dc\ub7ec\uc6b4 \ub465\uadfc \uace1\uc120\",\n  },\n  {\n    key: \"pr\",\n    label: \"PR \uac04\uaca9\",\n    labelEn: \"PR Interval\",\n    desc: \"\uc2ec\ubc29\uc5d0\uc11c \uc2ec\uc2e4\ub85c \uc2e0\ud638\uac00 \uc804\ub2ec\ub418\ub294 \ub370 \uac78\ub9ac\ub294 \uc2dc\uac04\uc785\ub2c8\ub2e4. \ubc29\uc2e4\uacb0\uc808\uc5d0\uc11c \uc57d\uac04\uc758 \uc9c0\uc5f0\uc774 \uc77c\uc5b4\ub0a9\ub2c8\ub2e4.\",\n    detail: \"120\u2013200ms \u00b7 P\ud30c \uc2dc\uc791\ubd80\ud130 QRS \uc2dc\uc791\uae4c\uc9c0\",\n  },\n  {\n    key: \"qrs\",\n    label: \"QRS\uad70\",\n    labelEn: \"QRS Complex\",\n    desc: \"\uc2ec\uc2e4\uc758 \ud0c8\ubd84\uadf9(\uc218\ucd95)\uc744 \ub098\ud0c0\ub0c5\ub2c8\ub2e4. \uc2ec\uc804\ub3c4\uc5d0\uc11c \uac00\uc7a5 \ud06c\uace0 \ubfb0\uc871\ud55c \ud30c\ud615\uc774\uc5d0\uc694.\",\n    detail: \"60\u2013100ms \u00b7 \uc881\uace0 \ube60\ub978 \uc2a4\ud30c\uc774\ud06c\",\n  },\n  {\n    key: \"t\",\n    label: \"T\ud30c\",\n    labelEn: \"T Wave\",\n    desc: \"\uc2ec\uc2e4\uc758 \uc7ac\ubd84\uadf9(\uc774\uc644 \uc900\ube44)\uc744 \ub098\ud0c0\ub0c5\ub2c8\ub2e4. QRS\ubcf4\ub2e4 \uc644\ub9cc\ud558\uace0 \ub465\uadfc \ubaa8\uc591\uc785\ub2c8\ub2e4.\",\n    detail: \"QRS\uc640 \uac19\uc740 \ubc29\ud5a5\uc774 \uc815\uc0c1\",\n  },\n];\n\n/* Quiz pool: NSR + a few rhythms, shuffled order each session */\nfunction buildQuizPool() {\n  const pool = [\n    { id: \"nsr\", name: \"\uc815\uc0c1\ub3d9\uc728\ub3d9\", abbr: \"NSR\", config: NSR_CONFIG },\n    ...RHYTHMS.map((r) => ({ id: r.id, name: r.name, abbr: r.abbr, config: r.config })),\n  ];\n  return pool;\n}\n\n/* ---------------- Small shared bits ---------------- */\n\nfunction ChevronLeft({ size = 18, className = \"\" }) {\n  return (\n    <svg width={size} height={size} viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2.2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className={className}>\n      <path d=\"m15 18-6-6 6-6\" />\n    </svg>\n  );\n}\nfunction ChevronRight({ size = 18, className = \"\" }) {\n  return (\n    <svg width={size} height={size} viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2.2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className={className}>\n      <path d=\"m9 18 6-6-6-6\" />\n    </svg>\n  );\n}\nfunction Check({ size = 16, className = \"\" }) {\n  return (\n    <svg width={size} height={size} viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2.6\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className={className}>\n      <path d=\"M20 6 9 17l-5-5\" />\n    </svg>\n  );\n}\nfunction X({ size = 16, className = \"\" }) {\n  return (\n    <svg width={size} height={size} viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2.6\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className={className}>\n      <path d=\"M18 6 6 18M6 6l12 12\" />\n    </svg>\n  );\n}\nfunction Layers({ size = 16, className = \"\" }) {\n  return (\n    <svg width={size} height={size} viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className={className}>\n      <path d=\"m12 2 9 5-9 5-9-5 9-5Z\" />\n      <path d=\"m3 12 9 5 9-5\" />\n      <path d=\"m3 17 9 5 9-5\" />\n    </svg>\n  );\n}\nfunction Brain({ size = 16, className = \"\" }) {\n  return (\n    <svg width={size} height={size} viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className={className}>\n      <circle cx=\"12\" cy=\"12\" r=\"9\" />\n      <path d=\"M12 7v10M7 12h10\" />\n    </svg>\n  );\n}\n\nfunction ECGEducationApp() {\n  const [view, setView] = useState(\"home\");\n  const [activeCategory, setActiveCategory] = useState(null);\n  const [selectedId, setSelectedId] = useState(null);\n  const [history, setHistory] = useState([]);\n  const [completedSteps, setCompletedSteps] = useState(() => new Set());\n\n  const selectedRhythm = RHYTHMS.find((r) => r.id === selectedId);\n\n  const go = (next, extra = {}) => {\n    setHistory((h) => [...h, { view, activeCategory, selectedId }]);\n    if (extra.category !== undefined) setActiveCategory(extra.category);\n    if (extra.id !== undefined) setSelectedId(extra.id);\n    setView(next);\n  };\n\n  const goHome = () => {\n    setHistory([]);\n    setView(\"home\");\n  };\n\n  const goBack = () => {\n    setHistory((h) => {\n      if (h.length === 0) {\n        setView(\"home\");\n        return h;\n      }\n      const prev = h[h.length - 1];\n      setView(prev.view);\n      setActiveCategory(prev.activeCategory);\n      setSelectedId(prev.selectedId);\n      return h.slice(0, -1);\n    });\n  };\n\n  const markRhythmLearned = (id) => {\n    setCompletedSteps((prev) => {\n      const next = new Set(prev);\n      next.add(id);\n      return next;\n    });\n  };\n\n  const progress = Math.round((completedSteps.size / RHYTHMS.length) * 100);\n\n  return (\n    <div className=\"ecg-app-root\">\n      <GlobalStyles />\n\n      <TopNav view={view} onHome={goHome} onBack={goBack} showBack={view !== \"home\"} />\n\n      {view === \"home\" && (\n        <HomeView\n          progress={progress}\n          completedCount={completedSteps.size}\n          onLearn={() => go(\"learn\")}\n          onLibrary={() => go(\"library\")}\n          onQuiz={() => go(\"quiz\")}\n        />\n      )}\n\n      {view === \"learn\" && <LearnView />}\n\n      {view === \"library\" && (\n        <LibraryView\n          onOpenRanges={() => go(\"ranges\")}\n          onSelectRhythm={(id) => go(\"detail\", { id })}\n        />\n      )}\n\n      {view === \"ranges\" && <RangesView />}\n\n      {view === \"detail\" && selectedRhythm && (\n        <RhythmDetailView\n          rhythm={selectedRhythm}\n          learned={completedSteps.has(selectedRhythm.id)}\n          onMarkLearned={() => markRhythmLearned(selectedRhythm.id)}\n        />\n      )}\n\n      {view === \"quiz\" && <QuizView onFinishHome={goHome} />}\n\n      {view !== \"home\" && view !== \"quiz\" && view !== \"learn\" && (\n        <BottomTabs view={view} onHome={goHome} onLearn={() => go(\"learn\")} onLibrary={() => go(\"library\")} onQuiz={() => go(\"quiz\")} />\n      )}\n    </div>\n  );\n}\n\n/* ---------------- Top nav ---------------- */\nfunction TopNav({ view, onHome, onBack, showBack }) {\n  const titleMap = {\n    home: \"KHAIM ECG Atlas\",\n    learn: \"\ud30c\ud615 \uc77d\ub294 \ubc95\",\n    library: \"\ubd80\uc815\ub9e5 \ub77c\uc774\ube0c\ub7ec\ub9ac\",\n    ranges: \"\uc815\uc0c1 \ubc94\uc704 \uae30\uc900\ud45c\",\n    detail: \"\ub9ac\ub4ec \uc0c1\uc138\",\n    quiz: \"\ud034\uc988\",\n  };\n  return (\n    <header className=\"top-nav\">\n      {showBack ? (\n        <button className=\"nav-icon-btn\" onClick={onBack} aria-label=\"\ub4a4\ub85c\">\n          <ChevronLeft size={19} />\n        </button>\n      ) : (\n        <span className=\"nav-mark\">\u5fc3\u96fb</span>\n      )}\n      <span className=\"nav-title\">{titleMap[view]}</span>\n      {showBack && (\n        <button className=\"nav-icon-btn nav-home\" onClick={onHome} aria-label=\"\ud648\uc73c\ub85c\">\n          \u2302\n        </button>\n      )}\n    </header>\n  );\n}\n\nfunction BottomTabs({ view, onHome, onLearn, onLibrary, onQuiz }) {\n  return (\n    <nav className=\"bottom-tabs\">\n      <button className={`tab ${view === \"home\" ? \"active\" : \"\"}`} onClick={onHome}>\n        <span className=\"tab-dot\" />\ud648\n      </button>\n      <button className=\"tab\" onClick={onLearn}>\n        <Layers size={15} />\uc77d\ub294 \ubc95\n      </button>\n      <button className={`tab ${view === \"library\" || view === \"ranges\" || view === \"detail\" ? \"active\" : \"\"}`} onClick={onLibrary}>\n        <span className=\"tab-dot\" />\ub77c\uc774\ube0c\ub7ec\ub9ac\n      </button>\n      <button className=\"tab\" onClick={onQuiz}>\n        <Brain size={15} />\ud034\uc988\n      </button>\n    </nav>\n  );\n}\n\n/* ---------------- Home ---------------- */\nfunction HomeView({ progress, completedCount, onLearn, onLibrary, onQuiz }) {\n  return (\n    <div className=\"view home-view\">\n      <section className=\"hero\">\n        <span className=\"hero-kicker\">DIGITAL HEALTHCARE EDUCATION</span>\n        <h1 className=\"hero-title\">\uc2ec\uc804\ub3c4, \uc77d\ub294 \ubc95\ubd80\ud130 \ub77c\uc774\ube0c\ub7ec\ub9ac\uae4c\uc9c0</h1>\n        <p className=\"hero-sub\">\n          \uc815\uc0c1 \ud30c\ud615\uc758 \uad6c\uc870\ub97c \ub2e8\uacc4\ubcc4\ub85c \uc774\ud574\ud558\uace0, \ubd80\uc815\ub9e5\uc744 \ud55c\ub208\uc5d0 \ube44\uad50 \ud559\uc2b5\ud569\ub2c8\ub2e4.\n        </p>\n      </section>\n\n      <div className=\"action-grid\">\n        <button className=\"action-card primary\" onClick={onLearn}>\n          <span className=\"action-card-eyebrow\">STEP 1</span>\n          <span className=\"action-card-title\">\ud30c\ud615 \uc77d\ub294 \ubc95</span>\n          <span className=\"action-card-desc\">P-QRS-T &amp; \uc815\uc0c1 \ubc94\uc704</span>\n        </button>\n        <button className=\"action-card\" onClick={onLibrary}>\n          <span className=\"action-card-eyebrow\">REFERENCE</span>\n          <span className=\"action-card-title\">\ub77c\uc774\ube0c\ub7ec\ub9ac</span>\n          <span className=\"action-card-desc\">\ubd80\uc815\ub9e5 \uc804\uccb4 \ubaa9\ub85d</span>\n        </button>\n      </div>\n\n      <button className=\"action-card accent full\" onClick={onQuiz}>\n        <span className=\"action-card-eyebrow\">CHECK</span>\n        <span className=\"action-card-title\">\ud034\uc988\ub85c \uc810\uac80</span>\n        <span className=\"action-card-desc\">\ud30c\ud615 \ubcf4\uace0 \ub9de\ud788\uae30</span>\n      </button>\n\n      <div className=\"progress-card\">\n        <div className=\"progress-card-top\">\n          <span className=\"progress-label\">\ud559\uc2b5 \uc9c4\ud589\ub3c4</span>\n          <span className=\"progress-value\">{completedCount} / {RHYTHMS.length}\uac1c \ub9ac\ub4ec</span>\n        </div>\n        <div className=\"progress-bar-track\">\n          <div className=\"progress-bar-fill\" style={{ width: `${progress}%` }} />\n        </div>\n      </div>\n    </div>\n  );\n}\n\n/* ---------------- Learn (step by step) ---------------- */\nfunction LearnView() {\n  const [stepIdx, setStepIdx] = useState(0);\n  const step = LEARN_STEPS[stepIdx];\n\n  return (\n    <div className=\"view learn-view\">\n      <p className=\"section-intro\">\n        \uc815\uc0c1\ub3d9\uc728\ub3d9 \ud55c \ubc15\ub3d9\uc744 \ub2e8\uacc4\ubcc4\ub85c \uc9da\uc5b4\uac00\uba70, \uac01 \ud30c\ud615\uc774 \uc758\ubbf8\ud558\ub294 \uc2ec\uc7a5\uc758 \uc804\uae30 \ud65c\ub3d9\uc744 \uc775\ud799\ub2c8\ub2e4.\n      </p>\n\n      <div className=\"learn-strip-wrap\">\n        <svg viewBox=\"0 0 800 190\" className=\"ecg-svg\" preserveAspectRatio=\"none\">\n          <defs>\n            <pattern id=\"learn-grid\" width=\"20\" height=\"20\" patternUnits=\"userSpaceOnUse\">\n              <path d=\"M20 0H0V20\" fill=\"none\" stroke=\"#EEEDE7\" strokeWidth=\"0.6\" />\n            </pattern>\n          </defs>\n          <rect width=\"800\" height=\"190\" fill=\"#FCFCFA\" />\n          <rect width=\"800\" height=\"190\" fill=\"url(#learn-grid)\" />\n          <LearnBeat activeStep={step.key} />\n        </svg>\n      </div>\n\n      <div className=\"step-dots\">\n        {LEARN_STEPS.map((s, i) => (\n          <button\n            key={s.key}\n            className={`step-dot ${i === stepIdx ? \"active\" : \"\"} ${i < stepIdx ? \"done\" : \"\"}`}\n            onClick={() => setStepIdx(i)}\n            aria-label={s.label}\n          />\n        ))}\n      </div>\n\n      <div className=\"step-card\">\n        <span className=\"step-card-num\">STEP {stepIdx + 1} / {LEARN_STEPS.length}</span>\n        <h3 className=\"step-card-title\">\n          {step.label} <span className=\"step-card-en\">{step.labelEn}</span>\n        </h3>\n        <p className=\"step-card-desc\">{step.desc}</p>\n        <span className=\"step-card-detail\">{step.detail}</span>\n      </div>\n\n      <div className=\"step-nav\">\n        <button\n          className=\"step-nav-btn\"\n          disabled={stepIdx === 0}\n          onClick={() => setStepIdx((i) => Math.max(0, i - 1))}\n        >\n          <ChevronLeft size={16} /> \uc774\uc804\n        </button>\n        <button\n          className=\"step-nav-btn primary\"\n          disabled={stepIdx === LEARN_STEPS.length - 1}\n          onClick={() => setStepIdx((i) => Math.min(LEARN_STEPS.length - 1, i + 1))}\n        >\n          \ub2e4\uc74c <ChevronRight size={16} />\n        </button>\n      </div>\n\n      <div className=\"learn-divider\">\n        <span>\uc815\uc0c1 \ubc94\uc704 \uae30\uc900\ud45c</span>\n      </div>\n      <p className=\"section-intro\">\n        \uc704\uc5d0\uc11c \uc775\ud78c \uac01 \uad6c\uac04\uc774 \uc2e4\uc81c\ub85c \uc815\uc0c1 \ubc94\uc704\uc5d0 \ub4e4\uc5b4\uac00\ub294\uc9c0 \ud310\ub2e8\ud560 \ub54c \uae30\uc900\uc774 \ub418\ub294 \uc218\uce58\uc785\ub2c8\ub2e4.\n      </p>\n      <div className=\"ranges-table\">\n        <div className=\"ranges-table-head\">\n          <span>\ud56d\ubaa9</span>\n          <span>\uc815\uc0c1 \ubc94\uc704</span>\n        </div>\n        {NORMAL_RANGES.map((row) => (\n          <div className=\"ranges-row\" key={row.label}>\n            <div className=\"ranges-row-label\">\n              <span className=\"ranges-row-name\">{row.label}</span>\n              <span className=\"ranges-row-en\">{row.labelEn}</span>\n            </div>\n            <div className=\"ranges-row-value\">\n              <span className=\"value-num\">{row.value}</span>\n              <span className=\"value-unit\">{row.unit}</span>\n            </div>\n          </div>\n        ))}\n      </div>\n    </div>\n  );\n}\n\n/* Renders one labeled beat; highlights the active segment by key */\nfunction LearnBeat({ activeStep }) {\n  const baseline = 120;\n  // Fixed single-beat geometry tuned for a 800x190 canvas\n  const pStart = 90, pPeak = 120, pEnd = 150;\n  const prEnd = 230; // QRS start\n  const qDip = 245, rPeak = 280, sDip = 310, qrsEnd = 335;\n  const tStart = 380, tPeak = 430, tEnd = 480;\n\n  const dim = (key) => (activeStep && activeStep !== key ? 0.22 : 1);\n\n  return (\n    <g>\n      {/* baseline full trace, light */}\n      <path\n        d={`M0,${baseline} L${pStart},${baseline} Q${pPeak},${baseline - 13} ${pEnd},${baseline} L${230},${baseline} L${qDip},${baseline + 8} L${rPeak},${baseline - 80} L${sDip},${baseline + 22} L${qrsEnd},${baseline} L${tStart},${baseline} Q${tPeak},${baseline - 20} ${tEnd},${baseline} L800,${baseline}`}\n        fill=\"none\"\n        stroke=\"#C7CCC4\"\n        strokeWidth=\"2\"\n      />\n      {/* P wave highlight */}\n      <path\n        d={`M${pStart},${baseline} Q${pPeak},${baseline - 13} ${pEnd},${baseline}`}\n        fill=\"none\"\n        stroke=\"#3D5A6C\"\n        strokeWidth=\"3\"\n        opacity={dim(\"p\")}\n      />\n      {/* PR segment highlight */}\n      <line x1={pStart} y1={baseline} x2={230} y2={baseline} stroke=\"#C9911F\" strokeWidth=\"3\" opacity={dim(\"pr\")} />\n      {/* QRS highlight */}\n      <path\n        d={`M${230},${baseline} L${qDip},${baseline + 8} L${rPeak},${baseline - 80} L${sDip},${baseline + 22} L${qrsEnd},${baseline}`}\n        fill=\"none\"\n        stroke=\"#C8102E\"\n        strokeWidth=\"3.2\"\n        opacity={dim(\"qrs\")}\n      />\n      {/* T wave highlight */}\n      <path\n        d={`M${tStart},${baseline} Q${tPeak},${baseline - 20} ${tEnd},${baseline}`}\n        fill=\"none\"\n        stroke=\"#3D5A6C\"\n        strokeWidth=\"3\"\n        opacity={dim(\"t\")}\n      />\n      {/* labels */}\n      <text x={pPeak} y={baseline - 26} textAnchor=\"middle\" fontSize=\"15\" fontFamily=\"JetBrains Mono, monospace\" fill=\"#3D5A6C\" opacity={dim(\"p\")} fontWeight=\"600\">P</text>\n      <text x={(pStart + 230) / 2} y={baseline + 24} textAnchor=\"middle\" fontSize=\"11\" fontFamily=\"JetBrains Mono, monospace\" fill=\"#C9911F\" opacity={dim(\"pr\")} fontWeight=\"600\">PR</text>\n      <text x={rPeak} y={baseline - 92} textAnchor=\"middle\" fontSize=\"15\" fontFamily=\"JetBrains Mono, monospace\" fill=\"#C8102E\" opacity={dim(\"qrs\")} fontWeight=\"600\">QRS</text>\n      <text x={tPeak} y={baseline - 32} textAnchor=\"middle\" fontSize=\"15\" fontFamily=\"JetBrains Mono, monospace\" fill=\"#3D5A6C\" opacity={dim(\"t\")} fontWeight=\"600\">T</text>\n    </g>\n  );\n}\n\n/* ---------------- Library ---------------- */\nfunction LibraryView({ onOpenRanges, onSelectRhythm }) {\n  const categories = useMemo(() => {\n    const map = {};\n    RHYTHMS.forEach((r) => {\n      if (!map[r.category]) map[r.category] = [];\n      map[r.category].push(r);\n    });\n    return map;\n  }, []);\n\n  return (\n    <div className=\"view library-view\">\n      <button className=\"ranges-entry\" onClick={onOpenRanges}>\n        <div className=\"ranges-entry-text\">\n          <span className=\"ranges-entry-title\">\uc815\uc0c1 \ubc94\uc704 \uae30\uc900\ud45c</span>\n          <span className=\"ranges-entry-sub\">HR \u00b7 PR \u00b7 QRS \u00b7 QT \uc815\uc0c1 \uc218\uce58</span>\n        </div>\n        <ChevronRight size={17} />\n      </button>\n\n      {CATEGORY_ORDER.map((cat) => (\n        <section key={cat} className=\"category-block\">\n          <h3 className=\"category-title\">{cat}</h3>\n          <div className=\"rhythm-grid\">\n            {categories[cat].map((r) => (\n              <button key={r.id} className={`rhythm-card ${r.critical ? \"critical\" : \"\"}`} onClick={() => onSelectRhythm(r.id)}>\n                <div className=\"rhythm-card-strip\">\n                  <EcgStrip config={r.config} height={60} accent={r.critical ? \"#C8102E\" : \"#3D5A6C\"} uid={r.id} imageUrl={r.imageUrl} />\n                </div>\n                <div className=\"rhythm-card-body\">\n                  <span className=\"rhythm-card-name\">{r.name}</span>\n                  <span className=\"rhythm-card-en\">{r.nameEn} \u00b7 {r.abbr}</span>\n                </div>\n                <ChevronRight size={15} className=\"rhythm-card-chev\" />\n              </button>\n            ))}\n          </div>\n        </section>\n      ))}\n    </div>\n  );\n}\n\nfunction RangesView() {\n  return (\n    <div className=\"view library-view\">\n      <p className=\"section-intro\">\n        \ubaa8\ub4e0 \ubd80\uc815\ub9e5 \ud310\ub3c5\uc758 \ucd9c\ubc1c\uc810\uc740 \uc815\uc0c1 \ubc94\uc704\ub97c \uc815\ud655\ud788 \uc544\ub294 \uac83\uc785\ub2c8\ub2e4.\n      </p>\n      <div className=\"ranges-table\">\n        <div className=\"ranges-table-head\">\n          <span>\ud56d\ubaa9</span>\n          <span>\uc815\uc0c1 \ubc94\uc704</span>\n        </div>\n        {NORMAL_RANGES.map((row) => (\n          <div className=\"ranges-row\" key={row.label}>\n            <div className=\"ranges-row-label\">\n              <span className=\"ranges-row-name\">{row.label}</span>\n              <span className=\"ranges-row-en\">{row.labelEn}</span>\n            </div>\n            <div className=\"ranges-row-value\">\n              <span className=\"value-num\">{row.value}</span>\n              <span className=\"value-unit\">{row.unit}</span>\n            </div>\n          </div>\n        ))}\n      </div>\n      <div className=\"ecg-block\">\n        <span className=\"ecg-block-label\">\uae30\uc900 \ud30c\ud615 \u2014 \uc815\uc0c1\ub3d9\uc728\ub3d9 (NSR)</span>\n        <EcgStrip config={NSR_CONFIG} height={130} accent=\"#3D5A6C\" uid=\"ref\" />\n      </div>\n    </div>\n  );\n}\n\n/* ---------------- Detail ---------------- */\nfunction RhythmDetailView({ rhythm, learned, onMarkLearned }) {\n  return (\n    <div className=\"view detail-view\">\n      <div className=\"detail-head\">\n        <span className=\"detail-title\">{rhythm.name}</span>\n        <span className=\"detail-en\">{rhythm.nameEn} \u00b7 {rhythm.abbr}</span>\n      </div>\n\n      <div className=\"ecg-block large\">\n        <EcgStrip config={rhythm.config} height={170} accent={rhythm.critical ? \"#C8102E\" : \"#3D5A6C\"} animated uid={rhythm.id + \"-d\"} imageUrl={rhythm.imageUrl} />\n      </div>\n      <div className=\"hr-row\">\n        <span className={`hr-tag ${rhythm.critical ? \"critical\" : \"\"}`}>\uc2ec\ubc15\uc218 {rhythm.hrRange}</span>\n      </div>\n\n      <p className=\"detail-summary\">{rhythm.summary}</p>\n\n      <div className=\"item-cards\">\n        {rhythm.items.map((it, i) => (\n          <div className=\"item-card\" key={i}>\n            <span className=\"item-card-label\">{it.label}</span>\n            <span className=\"item-card-desc\">{it.desc}</span>\n          </div>\n        ))}\n      </div>\n\n      <div className={`clinical-note ${rhythm.critical ? \"critical\" : \"\"}`}>\n        <span className=\"clinical-note-label\">\uc784\uc0c1 \ud3ec\uc778\ud2b8</span>\n        <p>{rhythm.clinicalNote}</p>\n      </div>\n\n      <button className={`learned-btn ${learned ? \"done\" : \"\"}`} onClick={onMarkLearned} disabled={learned}>\n        {learned ? <><Check size={15} /> \ud559\uc2b5 \uc644\ub8cc</> : \"\ud559\uc2b5 \uc644\ub8cc\ub85c \ud45c\uc2dc\"}\n      </button>\n    </div>\n  );\n}\n\n/* ---------------- Quiz ---------------- */\nfunction QuizView({ onFinishHome }) {\n  const pool = useMemo(() => buildQuizPool(), []);\n  const [order] = useState(() => {\n    const arr = [...pool];\n    for (let i = arr.length - 1; i > 0; i--) {\n      const j = Math.floor(Math.random() * (i + 1));\n      [arr[i], arr[j]] = [arr[j], arr[i]];\n    }\n    return arr.slice(0, 6);\n  });\n  const [qIdx, setQIdx] = useState(0);\n  const [score, setScore] = useState(0);\n  const [picked, setPicked] = useState(null);\n  const [done, setDone] = useState(false);\n\n  const current = order[qIdx];\n\n  const options = useMemo(() => {\n    if (!current) return [];\n    const others = pool.filter((p) => p.id !== current.id);\n    const shuffled = [...others].sort(() => Math.random() - 0.5).slice(0, 3);\n    const all = [...shuffled, current].sort(() => Math.random() - 0.5);\n    return all;\n  }, [current, pool]);\n\n  if (order.length === 0) return null;\n\n  const handlePick = (opt) => {\n    if (picked) return;\n    setPicked(opt.id);\n    if (opt.id === current.id) setScore((s) => s + 1);\n  };\n\n  const next = () => {\n    if (qIdx + 1 >= order.length) {\n      setDone(true);\n      return;\n    }\n    setQIdx((i) => i + 1);\n    setPicked(null);\n  };\n\n  if (done) {\n    return (\n      <div className=\"view quiz-view quiz-result\">\n        <span className=\"quiz-result-label\">RESULT</span>\n        <h2 className=\"quiz-result-score\">{score} / {order.length}</h2>\n        <p className=\"quiz-result-desc\">\n          {score === order.length\n            ? \"\uc804 \ubb38\ud56d \uc815\ub2f5\uc785\ub2c8\ub2e4. \ud30c\ud615 \ud328\ud134\uc774 \ud655\uc2e4\ud788 \uc775\uc219\ud574\uc84c\ub124\uc694.\"\n            : \"\ud2c0\ub9b0 \ub9ac\ub4ec\uc740 \ub77c\uc774\ube0c\ub7ec\ub9ac\uc5d0\uc11c \ub2e4\uc2dc \ud655\uc778\ud574\ubcf4\uc138\uc694.\"}\n        </p>\n        <button className=\"quiz-restart-btn\" onClick={onFinishHome}>\ud648\uc73c\ub85c \ub3cc\uc544\uac00\uae30</button>\n      </div>\n    );\n  }\n\n  return (\n    <div className=\"view quiz-view\">\n      <div className=\"quiz-top\">\n        <span className=\"quiz-progress\">\ubb38\ud56d {qIdx + 1} / {order.length}</span>\n        <span className=\"quiz-score\">\ub9de\uc740 \uac1c\uc218 {score}</span>\n      </div>\n\n      <p className=\"quiz-question\">\uc774 \ud30c\ud615\uc740 \uc5b4\ub5a4 \ub9ac\ub4ec\uc77c\uae4c\uc694?</p>\n\n      <div className=\"ecg-block large\">\n        <EcgStrip config={current.config} height={170} accent=\"#1C2321\" uid={`quiz-${qIdx}`} />\n      </div>\n\n      <div className=\"quiz-options\">\n        {options.map((opt) => {\n          const isCorrect = opt.id === current.id;\n          const isPicked = picked === opt.id;\n          let cls = \"quiz-option\";\n          if (picked) {\n            if (isCorrect) cls += \" correct\";\n            else if (isPicked) cls += \" wrong\";\n            else cls += \" neutral\";\n          }\n          return (\n            <button key={opt.id} className={cls} onClick={() => handlePick(opt)} disabled={!!picked}>\n              <span>{opt.name}</span>\n              {picked && isCorrect && <Check size={16} />}\n              {picked && isPicked && !isCorrect && <X size={16} />}\n            </button>\n          );\n        })}\n      </div>\n\n      {picked && (\n        <button className=\"quiz-next-btn\" onClick={next}>\n          {qIdx + 1 >= order.length ? \"\uacb0\uacfc \ubcf4\uae30\" : \"\ub2e4\uc74c \ubb38\ud56d\"} <ChevronRight size={15} />\n        </button>\n      )}\n    </div>\n  );\n}\n\n/* ---------------- Global styles ---------------- */\nfunction GlobalStyles() {\n  return (\n    <style>{`\n      @import url('${FONT_IMPORT_URL}');\n\n      .ecg-app-root {\n        --paper: #FFFFFF;\n        --card: #F7F8F6;\n        --ink: #1C2321;\n        --red: #C8102E;\n        --red-soft: #FBEAEA;\n        --slate: #3D5A6C;\n        --slate-soft: #EAF0F2;\n        --amber: #C9911F;\n        --amber-soft: #FBF1DF;\n        --line: #E3E2DC;\n        --mute: #767D78;\n\n        background: var(--paper);\n        color: var(--ink);\n        font-family: 'Inter', sans-serif;\n        max-width: 480px;\n        margin: 0 auto;\n        min-height: 100vh;\n        display: flex;\n        flex-direction: column;\n      }\n      .ecg-app-root * { box-sizing: border-box; }\n      .ecg-app-root h1, .ecg-app-root h2, .ecg-app-root h3 {\n        font-family: 'Source Serif 4', Georgia, serif;\n        margin: 0;\n      }\n\n      /* Top nav */\n      .top-nav {\n        display: flex;\n        align-items: center;\n        gap: 10px;\n        padding: 16px 18px;\n        border-bottom: 1px solid var(--line);\n        position: sticky;\n        top: 0;\n        background: var(--paper);\n        z-index: 10;\n      }\n      .nav-mark {\n        font-family: 'Source Serif 4', serif;\n        font-weight: 700;\n        font-size: 15px;\n        color: var(--red);\n        width: 30px;\n        height: 30px;\n        border: 1.5px solid var(--red);\n        border-radius: 50%;\n        display: flex;\n        align-items: center;\n        justify-content: center;\n        flex-shrink: 0;\n      }\n      .nav-icon-btn {\n        width: 30px; height: 30px;\n        border-radius: 8px;\n        border: 1px solid var(--line);\n        background: var(--card);\n        display: flex; align-items: center; justify-content: center;\n        cursor: pointer;\n        color: var(--ink);\n        flex-shrink: 0;\n      }\n      .nav-icon-btn:active { background: var(--line); }\n      .nav-home { margin-left: auto; font-size: 15px; }\n      .nav-title { font-size: 14.5px; font-weight: 600; color: var(--ink); }\n\n      .view { padding: 22px 20px 28px; flex: 1; }\n\n      /* ---------- Home ---------- */\n      .hero {
